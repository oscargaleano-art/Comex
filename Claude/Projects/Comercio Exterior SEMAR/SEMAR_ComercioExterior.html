<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comercio Exterior — SEMAR</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--color-primary:#1a3a5c;--color-primary-light:#2a5080;--color-accent:#d4a017;--color-accent-light:#f0c040;--color-danger:#c0392b;--color-success:#27ae60;--color-warning:#e67e22;--color-info:#2980b9;--color-bg:#f4f6f9;--color-surface:#ffffff;--color-border:#dde2ec;--color-text:#1c2b3a;--color-text-muted:#6b7a90;--sidebar-width:220px;--topbar-height:60px;--radius:8px;--shadow:0 2px 8px rgba(0,0,0,.08);--shadow-md:0 4px 16px rgba(0,0,0,.12)}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--color-bg);color:var(--color-text);font-size:14px;line-height:1.5}
#app{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-width);background:var(--color-primary);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.logo-mark{width:36px;height:36px;background:var(--color-accent);color:var(--color-primary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;flex-shrink:0}
.logo-title{display:block;color:#fff;font-weight:700;font-size:15px;line-height:1.2}
.logo-sub{display:block;color:rgba(255,255,255,.55);font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.sidebar-nav{padding:12px 0;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;color:rgba(255,255,255,.7);text-decoration:none;font-size:13.5px;transition:all .15s;border-left:3px solid transparent}
.nav-item svg{width:18px;height:18px;fill:currentColor;flex-shrink:0}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:rgba(255,255,255,.12);color:#fff;border-left-color:var(--color-accent)}
.main-content{margin-left:var(--sidebar-width);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:var(--topbar-height);background:var(--color-surface);border-bottom:1px solid var(--color-border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
.topbar-title{font-size:17px;font-weight:600;color:var(--color-primary)}
.topbar-actions{display:flex;gap:8px}
.view-container{padding:24px;flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn svg{width:16px;height:16px;fill:currentColor}
.btn-primary{background:var(--color-primary);color:#fff}
.btn-primary:hover{background:var(--color-primary-light)}
.btn-accent{background:var(--color-accent);color:var(--color-primary)}
.btn-accent:hover{background:var(--color-accent-light)}
.btn-ghost{background:transparent;color:var(--color-text-muted);border:1px solid var(--color-border)}
.btn-ghost:hover{background:var(--color-bg);color:var(--color-text)}
.btn-sm{padding:5px 10px;font-size:12px}
.card{background:var(--color-surface);border-radius:var(--radius);border:1px solid var(--color-border);box-shadow:var(--shadow)}
.card-header{padding:14px 18px;border-bottom:1px solid var(--color-border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-weight:600;font-size:14px}
.card-body{padding:18px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.kpi-card{background:var(--color-surface);border-radius:var(--radius);border:1px solid var(--color-border);padding:18px 20px;display:flex;align-items:center;gap:14px}
.kpi-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kpi-icon svg{width:22px;height:22px;fill:#fff}
.kpi-icon.blue{background:var(--color-info)}
.kpi-icon.green{background:var(--color-success)}
.kpi-icon.orange{background:var(--color-warning)}
.kpi-icon.red{background:var(--color-danger)}
.kpi-icon.navy{background:var(--color-primary)}
.kpi-value{font-size:24px;font-weight:700;line-height:1}
.kpi-label{font-size:12px;color:var(--color-text-muted);margin-top:2px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--color-text-muted);border-bottom:2px solid var(--color-border);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--color-border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(0,0,0,.018)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.badge-borrador,.badge-pendiente{background:#eef2f7;color:#5a6a7e}
.badge-confirmado,.badge-en_produccion{background:#e8f4fd;color:#1a6fa8}
.badge-embarcado,.badge-en_transito{background:#fff8e6;color:#b07d00}
.badge-en_puerto,.badge-en_aduana{background:#fff0e6;color:#b35900}
.badge-liberado,.badge-parcial{background:#e8f5e9;color:#1e7e34}
.badge-entregado,.badge-pagado{background:#e9fbe9;color:#155724}
.badge-cancelado{background:#fde8e8;color:#8b1a1a}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
label{font-size:12px;font-weight:600;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.4px}
input,select,textarea{padding:8px 10px;border:1px solid var(--color-border);border-radius:var(--radius);font-size:13.5px;background:var(--color-surface);color:var(--color-text);transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--color-primary)}
textarea{resize:vertical;min-height:70px}
.form-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--color-border)}
.filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.filter-bar input,.filter-bar select{max-width:200px}
.filter-bar .spacer{flex:1}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:var(--color-surface);border-radius:12px;width:100%;max-width:680px;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shadow-md)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--color-border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-header h3{font-size:15px;font-weight:600}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--color-text-muted);line-height:1;padding:0 4px}
.modal-close:hover{color:var(--color-text)}
.modal-body{padding:20px;overflow-y:auto}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px 20px}
.detail-item .detail-label{font-size:11px;font-weight:600;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.detail-item .detail-value{font-size:14px}
.empty-state{text-align:center;padding:48px 20px;color:var(--color-text-muted)}
.empty-state p{font-size:14px}
.alert{padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:12px}
.alert-warning{background:#fff8e6;border:1px solid #f0c040;color:#7a5500}
.alert-danger{background:#fdecea;border:1px solid #f5a5a5;color:#8b1a1a}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--color-border);border-radius:3px}
</style>
</head>
<body>
<div id="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">S</div>
      <div class="logo-text">
        <span class="logo-title">SEMAR</span>
        <span class="logo-sub">Comercio Exterior</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-view="dashboard">
        <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>Dashboard
      </a>
      <a href="#" class="nav-item" data-view="proveedores">
        <svg viewBox="0 0 24 24"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"/></svg>Proveedores
      </a>
      <a href="#" class="nav-item" data-view="pedidos">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>Pedidos / OC
      </a>
      <a href="#" class="nav-item" data-view="embarques">
        <svg viewBox="0 0 24 24"><path d="M20 21c-1.39 0-2.78-.47-4-1.32-2.44 1.71-5.56 1.71-8 0C6.78 20.53 5.39 21 4 21H2v2h2c1.38 0 2.74-.35 4-.99 2.52 1.29 5.48 1.29 8 0 1.26.65 2.62.99 4 .99h2v-2h-2zM3.95 19H4c1.6 0 3.02-.88 4-2 .98 1.12 2.4 2 4 2s3.02-.88 4-2c.98 1.12 2.4 2 4 2h.05l1.89-6.68c.08-.26.06-.54-.06-.78s-.34-.42-.6-.5L20 10.62V6c0-1.1-.9-2-2-2h-3V1H9v3H6c-1.1 0-2 .9-2 2v4.62l-1.29.42c-.26.08-.48.26-.6.5s-.15.52-.06.78L3.95 19zM6 6h12v3.97L12 8 6 9.97V6z"/></svg>Embarques
      </a>
      <a href="#" class="nav-item" data-view="documentos">
        <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>Documentación
      </a>

        <svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>Facturas y Pagos
      </a>
    </nav>
  </aside>
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-title" id="page-title">Dashboard</div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </header>
    <div class="view-container" id="view-container"></div>
  </main>
</div>

<div class="modal-overlay" id="modal-overlay" style="display:none">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ── DB / API ──────────────────────────────────────────────────────────────────
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbwMM3g96L1ThGD6lXgO3Y9EmE3QGruBrSsO48PRl8Tm43gwIh--AL-yeCiuyfupSzyRRQ/exec';
const TABLAS=['proveedores','pedidos','pedido_items','embarques','documentos','facturas','pagos','despachos'];
const _cache={};TABLAS.forEach(t=>_cache[t]=[]);
function _parseRow(row){const obj={};for(const k in row){let v=row[k];if(v===''||v===null||v===undefined){obj[k]=(v==='')?'':null;continue}if(['id','proveedor_id','pedido_id','embarque_id','factura_id','importe','pagado','flete_importe','precio_unitario','cantidad','importe_total','tipo_cambio','importe_gs'].includes(k)){obj[k]=(v===''||v===null)?null:Number(v)}else if(k==='activo'){obj[k]=(v===true||v===1||v==='1'||v==='true'||String(v).toLowerCase()==='true')?1:0}else{obj[k]=v}}return obj}
async function _syncTabla(tabla){await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({accion:'guardar',tabla,datos:_cache[tabla]}),headers:{'Content-Type':'text/plain'}})}
async function initDB(){const c=document.getElementById('view-container');if(c)c.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:16px"><div style="width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#1a3a5c;border-radius:50%;animation:spin 0.8s linear infinite"></div><p style="color:#64748b;font-size:14px">Conectando con Google Sheets...</p></div>`;try{const r=await Promise.all(TABLAS.map(t=>fetch(`${SCRIPT_URL}?tabla=${t}`).then(r=>r.json()).then(rows=>({t,rows:rows.map(_parseRow)})).catch(()=>({t,rows:[]}))));r.forEach(({t,rows})=>{const seen=new Set();_cache[t]=rows.filter(x=>{if(!x.id||seen.has(x.id))return false;seen.add(x.id);return true})})}catch(e){console.warn('Fallback localStorage',e);TABLAS.forEach(t=>{try{const l=localStorage.getItem('semar_'+t);if(l&&!_cache[t].length)_cache[t]=JSON.parse(l)}catch{}})}}
const DB={_get(k){return _cache[k]||[]},_set(k,d){_cache[k]=d;_syncTabla(k).catch(e=>console.warn('Sync error:',e))},_nextId(k){const i=this._get(k);return i.length?Math.max(...i.map(x=>x.id||0))+1:1},now(){return new Date().toISOString()},list(t,f={}){let i=this._get(t);for(const[k,v]of Object.entries(f)){if(v!==undefined&&v!=='')i=i.filter(x=>String(x[k])===String(v))}return i},get(t,id){return this._get(t).find(i=>i.id===Number(id))||null},insert(t,d){const i=this._get(t);const x={...d,id:this._nextId(t),created_at:this.now(),updated_at:this.now()};i.push(x);this._set(t,i);return x.id},update(t,id,d){const i=this._get(t);const idx=i.findIndex(x=>x.id===Number(id));if(idx>=0){i[idx]={...i[idx],...d,updated_at:this.now()};this._set(t,i)}return idx>=0},softDelete(t,id){return this.update(t,id,{activo:0})}};

const API={
  getDashboard(){
    const provs=DB.list('proveedores',{activo:1}),peds=DB.list('pedidos'),embs=DB.list('embarques'),facts=DB.list('facturas'),docs=DB.list('documentos');
    const pedsAct=peds.filter(p=>!['ENTREGADO','CANCELADO'].includes(p.estado));
    const embsAct=embs.filter(e=>e.estado!=='ENTREGADO');
    const factsP=facts.filter(f=>['PENDIENTE','PARCIAL'].includes(f.estado_pago));
    const deuda=factsP.reduce((s,f)=>s+(f.importe||0),0);
    const ec={};peds.forEach(p=>{ec[p.estado]=(ec[p.estado]||0)+1});
    const ped_estado=Object.entries(ec).map(([estado,cantidad])=>({estado,cantidad}));
    const embA=embsAct.slice(0,10).map(e=>{const p=e.pedido_id?DB.get('pedidos',e.pedido_id):null;const pv=p?.proveedor_id?DB.get('proveedores',p.proveedor_id):null;return{...e,numero_oc:p?.numero_oc,proveedor_nombre:pv?.razon_social}}).sort((a,b)=>(a.eta||'9999')<(b.eta||'9999')?-1:1);
    const facP=factsP.slice(0,10).map(f=>({...f,proveedor_nombre:f.proveedor_id?DB.get('proveedores',f.proveedor_id)?.razon_social:null})).sort((a,b)=>(a.fecha_vencimiento||'9999')<(b.fecha_vencimiento||'9999')?-1:1);
    return{totales:{proveedores:provs.length,pedidos_activos:pedsAct.length,embarques_activos:embsAct.length,deuda_total:deuda},pedidos_por_estado:ped_estado,embarques_activos:embA,facturas_pendientes:facP,documentos_pendientes:docs.filter(d=>d.estado==='PENDIENTE').length};
  },
  getProveedores(f={}){let i=DB.list('proveedores');if(f.activo!==undefined)i=i.filter(p=>p.activo===(f.activo==='true'||f.activo===true?1:0));if(f.pais)i=i.filter(p=>p.pais===f.pais);return i.sort((a,b)=>a.razon_social.localeCompare(b.razon_social))},
  getProveedor(id){return DB.get('proveedores',id)},
  saveProveedor(d,id=null){if(id){DB.update('proveedores',id,d);return id}return DB.insert('proveedores',{...d,activo:1})},
  getPedidos(f={}){let i=DB.list('pedidos');if(f.estado)i=i.filter(p=>p.estado===f.estado);return i.map(p=>{const pv=p.proveedor_id?DB.get('proveedores',p.proveedor_id):null;return{...p,proveedor_nombre:pv?.razon_social,proveedor_pais:pv?.pais}}).sort((a,b)=>b.fecha_emision<a.fecha_emision?-1:1)},
  getPedido(id){const p=DB.get('pedidos',id);if(!p)return null;const pv=p.proveedor_id?DB.get('proveedores',p.proveedor_id):null;p.proveedor_nombre=pv?.razon_social;p.proveedor_pais=pv?.pais;p.items=DB.list('pedido_items').filter(i=>i.pedido_id===Number(id));return p},
  savePedido(d){const{items,...pd}=d;const tot=(items||[]).reduce((s,i)=>s+(i.cantidad*i.precio_unitario),0);const id=DB.insert('pedidos',{...pd,estado:'BORRADOR',importe_total:tot});if(items)items.forEach(i=>DB.insert('pedido_items',{...i,pedido_id:id}));return id},
  updatePedidoEstado(id,estado){DB.update('pedidos',id,{estado})},
  getEmbarques(f={}){let i=DB.list('embarques');if(f.estado)i=i.filter(e=>e.estado===f.estado);return i.map(e=>{const p=e.pedido_id?DB.get('pedidos',e.pedido_id):null;const pv=p?.proveedor_id?DB.get('proveedores',p.proveedor_id):null;return{...e,numero_oc:p?.numero_oc,proveedor_nombre:pv?.razon_social}}).sort((a,b)=>(a.eta||'9999')<(b.eta||'9999')?-1:1)},
  getEmbarque(id){const e=DB.get('embarques',id);if(!e)return null;const p=e.pedido_id?DB.get('pedidos',e.pedido_id):null;const pv=p?.proveedor_id?DB.get('proveedores',p.proveedor_id):null;e.numero_oc=p?.numero_oc;e.proveedor_nombre=pv?.razon_social;e.documentos=DB.list('documentos').filter(d=>d.embarque_id===Number(id));e.despacho=DB.list('despachos').find(d=>d.embarque_id===Number(id))||null;return e},
  saveEmbarque(d){return DB.insert('embarques',{...d,estado:'EN_TRANSITO'})},
  updateEmbarqueEstado(id,estado,fecha){DB.update('embarques',id,{estado,...(fecha?{fecha_arribo_real:fecha}:{})})},
  getDocumentos(f={}){let i=DB.list('documentos');if(f.embarque_id)i=i.filter(d=>String(d.embarque_id)===String(f.embarque_id));if(f.tipo_documento)i=i.filter(d=>d.tipo_documento===f.tipo_documento);if(f.estado)i=i.filter(d=>d.estado===f.estado);return i.map(d=>{const e=d.embarque_id?DB.get('embarques',d.embarque_id):null;const p=d.pedido_id?DB.get('pedidos',d.pedido_id):null;return{...d,numero_embarque:e?.numero_embarque,numero_oc:p?.numero_oc}}).sort((a,b)=>b.created_at<a.created_at?-1:1)},
  saveDocumento(d){return DB.insert('documentos',{...d,estado:'PENDIENTE'})},
  updateDocumentoEstado(id,estado){DB.update('documentos',id,{estado})},
  getFacturas(f={}){let i=DB.list('facturas');if(f.estado_pago)i=i.filter(x=>x.estado_pago===f.estado_pago);const pagos=DB.list('pagos');return i.map(x=>{const pv=x.proveedor_id?DB.get('proveedores',x.proveedor_id):null;const p=x.pedido_id?DB.get('pedidos',x.pedido_id):null;const pagado=pagos.filter(pg=>pg.factura_id===x.id).reduce((s,pg)=>s+pg.importe,0);return{...x,proveedor_nombre:pv?.razon_social,numero_oc:p?.numero_oc,pagado}}).sort((a,b)=>(a.fecha_vencimiento||'9999')<(b.fecha_vencimiento||'9999')?-1:1)},
  getFactura(id){const f=DB.get('facturas',id);if(!f)return null;const pv=f.proveedor_id?DB.get('proveedores',f.proveedor_id):null;const p=f.pedido_id?DB.get('pedidos',f.pedido_id):null;f.proveedor_nombre=pv?.razon_social;f.numero_oc=p?.numero_oc;f.pagos=DB.list('pagos').filter(pg=>pg.factura_id===Number(id));return f},
  saveFactura(d){const gs=d.tipo_cambio?d.importe*d.tipo_cambio:null;return DB.insert('facturas',{...d,importe_gs:gs,estado_pago:'PENDIENTE'})},
  registrarPago(fid,d){DB.insert('pagos',{...d,factura_id:Number(fid)});const f=DB.get('facturas',fid);const tot=DB.list('pagos').filter(p=>p.factura_id===Number(fid)).reduce((s,p)=>s+p.importe,0);DB.update('facturas',fid,{estado_pago:tot>=f.importe?'PAGADO':'PARCIAL'})}
};

// ── Utils ─────────────────────────────────────────────────────────────────────
function fmtDate(d){if(!d)return'—';return new Date(d+'T00:00:00').toLocaleDateString('es-PY',{day:'2-digit',month:'2-digit',year:'numeric'})}
function fmtMoney(n,m){if(n==null||n==='')return'—';const s=m==='USD'?'USD ':m==='PYG'?'Gs. ':(m||'')+' ';if(m==='PYG')return s+Math.round(n).toLocaleString('es-PY');return s+Number(n).toLocaleString('es-PY',{minimumFractionDigits:2,maximumFractionDigits:2})}
function badge(e){const k=(e||'').toLowerCase().replace(/ /g,'_');return`<span class="badge badge-${k}">${e}</span>`}
function openModal(t,h){document.getElementById('modal-title').textContent=t;document.getElementById('modal-body').innerHTML=h;document.getElementById('modal-overlay').style.display='flex'}
function closeModal(){document.getElementById('modal-overlay').style.display='none'}
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});
function showToast(msg,type='ok'){const t=document.createElement('div');t.style.cssText=`position:fixed;bottom:20px;right:20px;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:opacity .3s;background:${type==='ok'?'#27ae60':'#c0392b'};color:#fff`;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300)},2500)}
function etaDaysLabel(eta){if(!eta)return'';const d=Math.round((new Date(eta)-new Date())/86400000);if(d<0)return`<span style="color:var(--color-danger);font-size:11px">${Math.abs(d)}d vencido</span>`;if(d===0)return`<span style="color:var(--color-warning);font-size:11px">Hoy</span>`;if(d<=7)return`<span style="color:var(--color-warning);font-size:11px">${d}d</span>`;return`<span style="color:var(--color-text-muted);font-size:11px">${d}d</span>`}
function formData(f){const d={};new FormData(f).forEach((v,k)=>{d[k]=v===''?null:v});return d}

function filtrarEmbarques(){const b=document.getElementById('buscar-emb').value.toLowerCase(),e=document.getElementById('filtro-estado-emb').value;document.querySelector('#tabla-embarques tbody').innerHTML=renderEmbarquesRows(window._embarques.filter(x=>(!b||x.numero_embarque.toLowerCase().includes(b)||(x.numero_bl_awb||'').toLowerCase().includes(b)||(x.naviera_transportista||'').toLowerCase().includes(b))&&(!e||x.estado===e)))}
function verEmbarque(id){const e=API.getEmbarque(id);const dh=e.documentos&&e.documentos.length?`<table><thead><tr><th>Tipo</th><th>N° Doc.</th><th>Fecha</th><th>Estado</th></tr></thead><tbody>${e.documentos.map(d=>`<tr><td>${d.tipo_documento.replace(/_/g,' ')}</td><td>${d.numero_documento||'—'}</td><td>${fmtDate(d.fecha_emision)}</td><td>${badge(d.estado)}</td></tr>`).join('')}</tbody></table>`:'<p style="font-size:13px;color:var(--color-text-muted)">Sin documentos</p>';openModal(`Embarque ${e.numero_embarque}`,`<div class="detail-grid" style="margin-bottom:16px"><div class="detail-item"><div class="detail-label">OC vinculada</div><div class="detail-value">${e.numero_oc||'—'}</div></div><div class="detail-item"><div class="detail-label">Proveedor</div><div class="detail-value">${e.proveedor_nombre||'—'}</div></div><div class="detail-item"><div class="detail-label">Estado</div><div class="detail-value">${badge(e.estado)}</div></div><div class="detail-item"><div class="detail-label">Transporte</div><div class="detail-value">${e.tipo_transporte}</div></div><div class="detail-item"><div class="detail-label">BL / AWB</div><div class="detail-value">${e.numero_bl_awb||'—'}</div></div><div class="detail-item"><div class="detail-label">Contenedor</div><div class="detail-value">${e.contenedor||'—'}</div></div><div class="detail-item"><div class="detail-label">Naviera</div><div class="detail-value">${e.naviera_transportista||'—'}</div></div><div class="detail-item"><div class="detail-label">Puerto origen</div><div class="detail-value">${e.puerto_origen||'—'}</div></div><div class="detail-item"><div class="detail-label">Fecha embarque</div><div class="detail-value">${fmtDate(e.fecha_embarque)}</div></div><div class="detail-item"><div class="detail-label">ETA</div><div class="detail-value">${fmtDate(e.eta)} ${etaDaysLabel(e.eta)}</div></div><div class="detail-item"><div class="detail-label">Arribo real</div><div class="detail-value">${fmtDate(e.fecha_arribo_real)}</div></div><div class="detail-item"><div class="detail-label">Despachante</div><div class="detail-value">${e.despachante||'—'}</div></div><div class="detail-item"><div class="detail-label">Flete</div><div class="detail-value">${fmtMoney(e.flete_importe,e.flete_moneda||'USD')}</div></div></div><div class="card-title" style="margin-bottom:8px">Documentación</div>${dh}`)}
function cambiarEstadoEmbarque(id,ea){const es=['EN_TRANSITO','EN_PUERTO','EN_ADUANA','LIBERADO','ENTREGADO'];openModal('Actualizar estado de embarque',`<div class="form-group" style="margin-bottom:12px"><label>Nuevo estado</label><select id="nuevo-estado-emb" style="margin-top:6px">${es.map(e=>`<option value="${e}" ${e===ea?'selected':''}>${e.replace(/_/g,' ')}</option>`).join('')}</select></div><div class="form-group"><label>Fecha arribo real (opcional)</label><input type="date" id="fecha-arribo"></div><div class="form-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="aplicarEstadoEmbarque(${id})">Actualizar</button></div>`)}
function aplicarEstadoEmbarque(id){API.updateEmbarqueEstado(id,document.getElementById('nuevo-estado-emb').value,document.getElementById('fecha-arribo').value||null);closeModal();showToast('Estado actualizado');renderTablaEmbarques()}

function renderTablaDocumentos(){const d=API.getDocumentos();window._docs=d;document.getElementById('view-container').innerHTML=`<div class="filter-bar"><select id="filtro-tipo-doc" onchange="filtrarDocs()"><option value="">Todos los tipos</option>${TIPOS_DOC.map(t=>`<option>${t}</option>`).join('')}</select><select id="filtro-estado-doc" onchange="filtrarDocs()"><option value="">Todos los estados</option>${['PENDIENTE','RECIBIDO','VERIFICADO','OBSERVADO'].map(e=>`<option>${e}</option>`).join('')}</select></div><div class="card"><div class="table-wrap"><table id="tabla-docs"><thead><tr><th>Tipo</th><th>N° Documento</th><th>Embarque</th><th>OC</th><th>Fecha emisión</th><th>Vencimiento</th><th>Estado</th><th></th></tr></thead><tbody>${renderDocsRows(d)}</tbody></table></div></div>`}
function renderDocsRows(d){if(!d.length)return`<tr><td colspan="8"><div class="empty-state"><p>No hay documentos registrados</p></div></td></tr>`;return d.map(x=>{const v=x.fecha_vencimiento&&x.fecha_vencimiento<new Date().toISOString().slice(0,10);return`<tr><td><strong>${x.tipo_documento.replace(/_/g,' ')}</strong></td><td>${x.numero_documento||'—'}</td><td>${x.numero_embarque||'—'}</td><td>${x.numero_oc||'—'}</td><td>${fmtDate(x.fecha_emision)}</td><td style="${v?'color:var(--color-danger);font-weight:600':''}">${fmtDate(x.fecha_vencimiento)}</td><td>${badge(x.estado)}</td><td><button class="btn btn-ghost btn-sm" onclick="cambiarEstadoDoc(${x.id},'${x.estado}')">Estado</button></td></tr>`}).join('')}

function cambiarEstadoDoc(id,ea){const es=['PENDIENTE','RECIBIDO','VERIFICADO','OBSERVADO'];openModal('Actualizar estado',`<div class="form-group" style="margin-bottom:12px"><label>Nuevo estado</label><select id="nuevo-estado-doc" style="margin-top:6px">${es.map(e=>`<option value="${e}" ${e===ea?'selected':''}>${e}</option>`).join('')}</select></div><div class="form-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="aplicarEstadoDoc(${id})">Actualizar</button></div>`)}

function viewFacturas(){document.getElementById('page-title').textContent='Facturas y Pagos';document.getElementById('topbar-actions').innerHTML=`<button class="btn btn-primary" onclick="formNuevaFactura()"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>Nueva factura</button>`;renderTablaFacturas()}
function renderTablaFacturas(){const f=API.getFacturas();window._facturas=f;const tp=f.filter(x=>['PENDIENTE','PARCIAL'].includes(x.estado_pago)).reduce((s,x)=>s+x.importe,0);document.getElementById('view-container').innerHTML=`<div class="filter-bar"><input type="search" id="buscar-fact" placeholder="Buscar factura o proveedor..." oninput="filtrarFacturas()" style="max-width:260px"><select id="filtro-estado-fact" onchange="filtrarFacturas()"><option value="">Todos los estados</option>${['PENDIENTE','PARCIAL','PAGADO'].map(e=>`<option>${e}</option>`).join('')}</select><div class="spacer"></div><div style="font-size:13px;color:var(--color-text-muted)">Total pendiente: <strong style="color:var(--color-danger)">${fmtMoney(tp,'USD')}</strong></div></div><div class="card"><div class="table-wrap"><table id="tabla-facturas"><thead><tr><th>N° Factura</th><th>Proveedor</th><th>OC</th><th>Fecha</th><th>Vencimiento</th><th>Importe</th><th>Pagado</th><th>Saldo</th><th>Estado</th><th></th></tr></thead><tbody>${renderFacturasRows(f)}</tbody></table></div></div>`}
function renderFacturasRows(f){if(!f.length)return`<tr><td colspan="10"><div class="empty-state"><p>No hay facturas registradas</p></div></td></tr>`;return f.map(x=>{const s=x.importe-(x.pagado||0),v=x.fecha_vencimiento&&x.fecha_vencimiento<new Date().toISOString().slice(0,10)&&x.estado_pago!=='PAGADO';return`<tr><td><strong>${x.numero_factura}</strong></td><td>${x.proveedor_nombre||'—'}</td><td>${x.numero_oc||'—'}</td><td>${fmtDate(x.fecha_factura)}</td><td style="${v?'color:var(--color-danger);font-weight:600':''}">${fmtDate(x.fecha_vencimiento)}</td><td>${fmtMoney(x.importe,x.moneda)}</td><td>${fmtMoney(x.pagado||0,x.moneda)}</td><td style="${s>0?'color:var(--color-danger)':'color:var(--color-success)'}">${fmtMoney(s,x.moneda)}</td><td>${badge(x.estado_pago)}</td><td><button class="btn btn-ghost btn-sm" onclick="verFactura(${x.id})">Ver</button> ${x.estado_pago!=='PAGADO'?`<button class="btn btn-accent btn-sm" onclick="formRegistrarPago(${x.id})">Pagar</button>`:''}</td></tr>`}).join('')}
function filtrarFacturas(){const b=document.getElementById('buscar-fact').value.toLowerCase(),e=document.getElementById('filtro-estado-fact').value;document.querySelector('#tabla-facturas tbody').innerHTML=renderFacturasRows(window._facturas.filter(f=>(!b||f.numero_factura.toLowerCase().includes(b)||(f.proveedor_nombre||'').toLowerCase().includes(b))&&(!e||f.estado_pago===e)))}
function verFactura(id){const f=API.getFactura(id);const tp=(f.pagos||[]).reduce((s,p)=>s+p.importe,0);const ph=f.pagos&&f.pagos.length?`<table><thead><tr><th>Fecha</th><th>Forma</th><th>Referencia</th><th>Banco</th><th>Importe</th></tr></thead><tbody>${f.pagos.map(p=>`<tr><td>${fmtDate(p.fecha_pago)}</td><td>${p.forma_pago||'—'}</td><td>${p.numero_referencia||'—'}</td><td>${p.banco||'—'}</td><td>${fmtMoney(p.importe,p.moneda||'USD')}</td></tr>`).join('')}</tbody></table>`:'<p style="font-size:13px;color:var(--color-text-muted)">Sin pagos</p>';openModal(`Factura ${f.numero_factura}`,`<div class="detail-grid" style="margin-bottom:16px"><div class="detail-item"><div class="detail-label">Proveedor</div><div class="detail-value">${f.proveedor_nombre||'—'}</div></div><div class="detail-item"><div class="detail-label">Estado</div><div class="detail-value">${badge(f.estado_pago)}</div></div><div class="detail-item"><div class="detail-label">Fecha factura</div><div class="detail-value">${fmtDate(f.fecha_factura)}</div></div><div class="detail-item"><div class="detail-label">Vencimiento</div><div class="detail-value">${fmtDate(f.fecha_vencimiento)}</div></div><div class="detail-item"><div class="detail-label">Importe total</div><div class="detail-value" style="font-weight:700">${fmtMoney(f.importe,f.moneda)}</div></div><div class="detail-item"><div class="detail-label">Pagado</div><div class="detail-value" style="color:var(--color-success)">${fmtMoney(tp,f.moneda)}</div></div><div class="detail-item"><div class="detail-label">Saldo</div><div class="detail-value" style="color:var(--color-danger);font-weight:700">${fmtMoney(f.importe-tp,f.moneda)}</div></div><div class="detail-item"><div class="detail-label">T/C</div><div class="detail-value">${f.tipo_cambio?'Gs. '+Number(f.tipo_cambio).toLocaleString('es-PY'):'—'}</div></div></div><div class="card-title" style="margin-bottom:8px">Pagos</div>${ph}${f.estado_pago!=='PAGADO'?`<div style="margin-top:12px"><button class="btn btn-accent" onclick="closeModal();formRegistrarPago(${f.id})">Registrar pago</button></div>`:''}`)}
function formRegistrarPago(fid){openModal('Registrar pago',`<form id="form-pago" onsubmit="guardarPago(event,${fid})"><div class="form-grid"><div class="form-group"><label>Fecha de pago *</label><input name="fecha_pago" type="date" required value="${new Date().toISOString().slice(0,10)}"></div><div class="form-group"><label>Importe *</label><input name="importe" type="number" step="0.01" required></div><div class="form-group"><label>Moneda</label><select name="moneda">${['USD','EUR','PYG'].map(m=>`<option>${m}</option>`).join('')}</select></div><div class="form-group"><label>Tipo de cambio (Gs.)</label><input name="tipo_cambio" type="number" step="1" placeholder="Ej: 7500"></div><div class="form-group"><label>Forma de pago</label><select name="forma_pago"><option value="">—</option>${['Transferencia','Carta de crédito','Cheque','Contado'].map(f=>`<option>${f}</option>`).join('')}</select></div><div class="form-group"><label>N° Referencia</label><input name="numero_referencia"></div><div class="form-group"><label>Banco</label><input name="banco"></div><div class="form-group full"><label>Notas</label><textarea name="notas"></textarea></div></div><div class="form-actions"><button type="button" class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button type="submit" class="btn btn-primary">Registrar pago</button></div></form>`)}
function guardarPago(e,fid){e.preventDefault();const d=formData(e.target);d.importe=Number(d.importe);if(d.tipo_cambio)d.tipo_cambio=Number(d.tipo_cambio);API.registrarPago(fid,d);closeModal();showToast('Pago registrado');renderTablaFacturas()}

function guardarFactura(e){e.preventDefault();const d=formData(e.target);d.importe=Number(d.importe);if(d.tipo_cambio)d.tipo_cambio=Number(d.tipo_cambio);if(d.proveedor_id)d.proveedor_id=Number(d.proveedor_id);if(d.pedido_id)d.pedido_id=Number(d.pedido_id);API.saveFactura(d);closeModal();showToast('Factura guardada');renderTablaFacturas()}
